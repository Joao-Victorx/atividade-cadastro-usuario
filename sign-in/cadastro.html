<!DOCTYPE html>
<html lang='pt-br'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="canonical" href="https://getbootstrap.com/docs/5.3/examples/sign-in/" />
    <link href="../assets/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Tela de Cadastro</title>
</head>

<body class="d-flex justify-content-center align-items-top vh-100">
    <main class="p-4 border rounded shadow bg-white m-4 w-50">
        <h1 class="text-center mb-5">Cadastro de Usuário</h1>
        <div class="container mb-4">
            <label class="fw-semibold">Nome</label>
            <div class="d-flex justify-content-center align-items-center">
                <input type="text" class="form-control" id="nomeUser">
                <button class="btn btn-primary ms-5 w-25 fw-semibold" type="button" onclick="salvarUser()">Salvar</button>
            </div>
        </div>
        <div class="container">
            <table class="table table-striped" id="tabela">
                <tr>
                    <th>Nome Usuário</th>
                    <th>Ações</th>
                </tr>
            </table>
        </div>
    </main>
    <script src="main.js"></script>
</body>

</html>
