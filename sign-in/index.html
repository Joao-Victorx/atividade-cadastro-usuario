<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>

  <!-- Bootstrap CDN (mais seguro que caminho local) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="sign-in.css">
</head>

<body class="bg-light">

  <div class="d-flex justify-content-center align-items-center vh-100">
    <main class="form-signin p-4 border rounded shadow bg-white" style="width: 100%; max-width: 400px;">
      
      <form>
        <div class="text-center">
          <img class="mb-3" src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo.svg" width="72">
          <h1 class="h4 mb-3 fw-normal">Entrar</h1>
        </div>

        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
          <label for="loginEmail">Email</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="loginSenha" placeholder="Senha" required>
          <label for="loginSenha">Senha</label>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="checkDefault">
          <label class="form-check-label" for="checkDefault">
            Lembrar de mim
          </label>
        </div>

        <button onclick="acessar()" class="btn btn-primary w-100 py-2" type="button">
          Entrar
        </button>

        <p class="mt-4 mb-0 text-center text-muted small">&copy; 2026</p>
      </form>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>

</body>
</html>
