<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signin Template · Bootstrap v5.3</title>
  <link rel="canonical" href="https://getbootstrap.com/docs/5.3/examples/sign-in/" />
  <link href="../assets/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="sign-in.css">
</head>

<body class="d-flex align-items-center py-4 bg-body-tertiary">
  <main class="form-signin w-100 m-auto">
    <form>
      <img class="mb-4" src="../assets/brand/bootstrap-logo.svg" alt="" width="72" height="57" />
      <h1 class="h3 mb-3 fw-normal">Please sign in</h1>
      <div class="form-floating">
        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" />
        <label for="floatingInput">Email</label>
      </div>
      <div class="form-floating">
        <input type="password" class="form-control" id="loginSenha" placeholder="Password" />
        <label for="floatingPassword">Senha</label>
      </div>
      <div class="form-check text-start my-3">
        <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault" />
        <label class="form-check-label" for="checkDefault">
          Remember me
        </label>
      </div>
      <button onclick="acessar()" class="btn btn-primary w-100 py-2" type="button">
        Sign in
      </button>
      <p class="mt-5 mb-3 text-body-secondary">&copy; 2017–2025</p>
    </form>
  </main>
  <script src="../assets/dist/js/bootstrap.bundle.min.js" class="astro-vvvwv3sm"></script>
  <script src="main.js"></script>
</body>

</html>
